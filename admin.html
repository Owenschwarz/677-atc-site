<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | 677 ATC</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo"><span class="num">677</span> ATC</a>
    <div class="nav-links"></div>
    <span class="logout-link" id="logout-btn" style="display:none;">Log Out</span>
  </nav>
</header>

<!-- LOGIN VIEW -->
<div id="login-view" class="admin-login">
  <h2>Admin Login</h2>
  <p>Sign in to view tour requests, class bookings, and inquiries.</p>
  <div class="field">
    <label for="login-email">Email</label>
    <input type="email" id="login-email">
  </div>
  <div class="field">
    <label for="login-password">Password</label>
    <input type="password" id="login-password">
  </div>
  <button type="button" class="submit-btn" id="login-btn" data-live>Log In</button>
  <p class="admin-error" id="login-error">Incorrect email or password.</p>
</div>

<!-- DASHBOARD VIEW -->
<div id="dashboard-view" class="wrap" style="display:none;">
  <div class="admin-bar">
    <h1>Submissions</h1>
    <button type="button" class="btn-secondary" id="refresh-btn">Refresh</button>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="new">New</button>
    <button class="filter-tab" data-filter="contacted">Contacted</button>
    <button class="filter-tab" data-filter="archived">Archived</button>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table" id="leads-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Athlete</th>
          <th>Parent</th>
          <th>Contact</th>
          <th>Interest</th>
          <th>Preferred Date/Time</th>
          <th>Message</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="leads-body">
      </tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">No submissions yet.</div>
  </div>
</div>

<script>
  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const logoutBtn = document.getElementById('logout-btn');
  let allLeads = [];
  let currentFilter = 'all';

  async function checkSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      const isAdmin = await verifyAdmin(session.user.id);
      if (isAdmin) {
        showDashboard();
      } else {
        await supabaseClient.auth.signOut();
        showLogin('This account does not have admin access.');
      }
    } else {
      showLogin();
    }
  }

  async function verifyAdmin(userId) {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', userId)
      .single();
    if (error || !data) return false;
    return data.role === 'admin';
  }

  function showLogin(message) {
    loginView.style.display = 'block';
    dashboardView.style.display = 'none';
    logoutBtn.style.display = 'none';
    const errorEl = document.getElementById('login-error');
    if (message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
  }

  function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    logoutBtn.style.display = 'inline-block';
    loadLeads();
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    errorEl.style.display = 'none';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errorEl.textContent = 'Incorrect email or password.';
      errorEl.style.display = 'block';
      return;
    }
    const isAdmin = await verifyAdmin(data.user.id);
    if (isAdmin) {
      showDashboard();
    } else {
      await supabaseClient.auth.signOut();
      errorEl.textContent = 'This account does not have admin access.';
      errorEl.style.display = 'block';
    }
  });

  logoutBtn.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    showLogin();
  });

  document.getElementById('refresh-btn').addEventListener('click', loadLeads);

  document.getElementById('filter-tabs').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-tab')) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderLeads();
  });

  async function loadLeads() {
    const { data, error } = await supabaseClient
      .from('leads')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      return;
    }
    allLeads = data;
    renderLeads();
  }

  function renderLeads() {
    const tbody = document.getElementById('leads-body');
    const emptyState = document.getElementById('empty-state');
    const filtered = currentFilter === 'all'
      ? allLeads
      : allLeads.filter(l => (l.status || 'new') === currentFilter);

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    tbody.innerHTML = filtered.map(lead => {
      const date = new Date(lead.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      const status = lead.status || 'new';
      const prefDate = lead.preferred_date ? new Date(lead.preferred_date).toLocaleDateString() : '';
      const prefWhen = [prefDate, lead.preferred_time].filter(Boolean).join(' — ') || '—';
      return `
        <tr>
          <td>${date}</td>
          <td>${escapeHtml(lead.request_type || '—')}</td>
          <td>${escapeHtml(lead.athlete_name || '—')}</td>
          <td>${escapeHtml(lead.parent_name || '—')}</td>
          <td>${escapeHtml(lead.email || '')}<br>${escapeHtml(lead.phone || '')}</td>
          <td>${escapeHtml(lead.program_interest || '—')}</td>
          <td>${escapeHtml(prefWhen)}</td>
          <td style="max-width:220px;">${escapeHtml(lead.message || '—')}</td>
          <td>
            <select class="status-select" data-id="${lead.id}">
              <option value="new" ${status === 'new' ? 'selected' : ''}>New</option>
              <option value="contacted" ${status === 'contacted' ? 'selected' : ''}>Contacted</option>
              <option value="archived" ${status === 'archived' ? 'selected' : ''}>Archived</option>
            </select>
          </td>
        </tr>
      `;
    }).join('');

    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        await supabaseClient.from('leads').update({ status: newStatus }).eq('id', id);
        const lead = allLeads.find(l => l.id === id);
        if (lead) lead.status = newStatus;
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  checkSession();
</script>

</body>
</html>
